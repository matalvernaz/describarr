services:
  ad-sync:
    build: .
    container_name: ad-sync
    environment:
      - AUDIOVAULT_EMAIL=${AUDIOVAULT_EMAIL}
      - AUDIOVAULT_PASSWORD=${AUDIOVAULT_PASSWORD}
      - AD_SYNC_MIN_SCORE=${AD_SYNC_MIN_SCORE:-65}
    volumes:
      # Mount the same media paths that Sonarr/Radarr use inside their containers.
      # These must match the container-side paths exactly (e.g. /tv, /movies).
      - /path/to/tv:/tv
      - /path/to/movies:/movies
    networks:
      - arr-network   # must be the same network as Sonarr/Radarr
    restart: unless-stopped

networks:
  arr-network:
    external: true
